{% extends 'base.html' %}

{% block titulo %}Crear Monitor{% endblock %}

{% block contenido %}
    <h2>Formulario de Monitor</h2>

    <form method="post">
        {% csrf_token %}

        <div>
            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre" required>
        </div>

        <br>

        <div>
            <label for="especializacion">Especialización:</label><br>
            <input type="text" id="especializacion" name="especializacion" required>
        </div>

        <button type="submit">Guardar monitor</button>
    </form>

    <br>

    <a href="{% url 'lista_monitores' %}">Volver al listado de monitores</a>
{% endblock %}
