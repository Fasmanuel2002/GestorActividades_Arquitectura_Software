{% extends 'base.html' %}

{% block titulo %}Inscribir usuario{% endblock %}

{% block contenido %}

    <h2>Inscribir usuario en: {{ actividad.nombre_actividad }}</h2>

    <form method="post">
        {% csrf_token %}

        <label for="usuario_id">Selecciona un usuario:</label><br>

        <select name="usuario_id" id="usuario_id" required>
            <option value="">Selecciona un usuario</option>

            {% for usuario in usuarios %}
                <option value="{{ usuario.id }}">
                    {{ usuario.nombre_usuario }} - {{ usuario.email_usuario }}
                </option>
            {% endfor %}
        </select>

        <br><br>

        <button type="submit">Inscribir usuario</button>
    </form>

    <br>

    <a href="{% url 'lista_actividades' %}">Volver a actividades</a>

{% endblock %}
